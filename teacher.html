<script>
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
window._fr=(async()=>{
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js');
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#f5ede0;direction:rtl;min-height:100vh;}
input{font-family:'Heebo',sans-serif;direction:rtl;}
input:focus{outline:none!important;border-color:#c4956a!important;box-shadow:0 0 0 2px rgba(180,120,60,.18)!important;}
.btn{transition:all .16s;cursor:pointer;font-family:'Heebo',sans-serif;border:none;}
.btn:hover:not(:disabled){opacity:.83;transform:translateY(-1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fi .3s ease;}
.card{transition:box-shadow .18s,transform .18s;}
.card:hover{box-shadow:0 5px 20px rgba(100,60,20,.12);transform:translateY(-2px);}
.sroll{height:10px;background:#c4956a;border-radius:5px;opacity:.6;}
.tab{cursor:pointer;padding:9px 18px;font-size:13px;font-family:'Heebo',sans-serif;border:none;border-bottom:2.5px solid transparent;background:transparent;color:#a08060;font-weight:400;transition:all .15s;}
.tab.active{color:#8b5e3c;border-bottom-color:#8b5e3c;font-weight:700;}
</style>
</head>
<body>
<div id="app"></div>
<script>
window._fr.then(()=>{

firebase.initializeApp({
  apiKey:"AIzaSyAx1FqiaiUei4zS08A-k9mvf-Sndyz5IcQ",
  authDomain:"tanakh-live.firebaseapp.com",
  databaseURL:"https://tanakh-live-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"tanakh-live",
  storageBucket:"tanakh-live.firebasestorage.app",
  messagingSenderId:"800812315850",
  appId:"1:800812315850:web:e99443749fc1c0f046b033"
});
const db=firebase.database();

const MASTER="admin2030";
const TC=12;
const DC={
  basic:  {bg:"rgba(176,64,64,.09)",bd:"rgba(176,64,64,.3)", c:"#8b3030",l:"בסיס"},
  medium: {bg:"rgba(184,134,11,.09)",bd:"rgba(184,134,11,.3)",c:"#8b6800",l:"ביניים"},
  advanced:{bg:"rgba(61,122,82,.09)",bd:"rgba(61,122,82,.3)", c:"#2d6040",l:"מתקדם"},
};

let S={
  screen:"login",isAdmin:false,myClass:"",
  tab:"students",selCls:"all",flt:"all",
  classes:{},teachers:{},ts:"—",unsub:null,
  msg:"",err:"",
};

// ── Event delegation — the key fix for Google Sites iframes ──────────────
document.addEventListener("click", e=>{
  const el=e.target.closest("[data-action]");
  if(!el)return;
  const a=el.dataset.action;
  const v=el.dataset.val||"";
  if(a==="login")        doLogin();
  else if(a==="logout")  logout();
  else if(a==="tab")     { S.tab=v; renderCurrent(); }
  else if(a==="selcls")  { S.selCls=v; renderDashboard(); }
  else if(a==="flt")     { S.flt=v; renderDashboard(); }
  else if(a==="add")     addTeacher();
  else if(a==="del")     deleteTeacher(v);
  else if(a==="reset")   resetClass(v);
});

document.addEventListener("keydown", e=>{
  if(e.key!=="Enter")return;
  const id=e.target?.id;
  if(id==="lP"||id==="lC") doLogin();
  if(id==="nP"||id==="nC"||id==="nN") addTeacher();
});

// ── Firebase ──────────────────────────────────────────────────────────────
function startListening(){
  if(S.unsub)S.unsub();
  const cRef=S.isAdmin?db.ref("classes"):db.ref(`classes/${S.myClass}`);
  const tRef=db.ref("teachers");
  cRef.on("value",snap=>{
    if(S.isAdmin)S.classes=snap.val()||{};
    else{S.classes={};S.classes[S.myClass]=snap.val()||{};}
    S.ts=new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
    if(S.screen==="dashboard")renderCurrent();
  });
  if(S.isAdmin)tRef.on("value",snap=>{S.teachers=snap.val()||{};if(S.screen==="dashboard")renderCurrent();});
  S.unsub=()=>{cRef.off("value");tRef.off("value");};
}
function renderCurrent(){S.tab==="admin"?renderAdmin():renderDashboard();}

// ── Login ─────────────────────────────────────────────────────────────────
function renderLogin(err=""){
  const app=document.getElementById("app");
  app.innerHTML=`
  <div style="min-height:100vh;background:#f5ede0;display:flex;align-items:center;justify-content:center;">
    <div class="fade" style="text-align:center;max-width:360px;padding:36px;width:100%;">
      <div style="font-family:'Frank Ruhl Libre',serif;font-size:26px;color:#3d2b1a;font-weight:700;margin-bottom:4px;">לוח מורה</div>
      <div style="font-size:12px;color:#a08060;margin-bottom:28px;">Tanakh-Live · עֲקֵדַת יִצְחָק</div>
      <div style="background:#f9f3e8;border:1.5px solid #c4956a;border-radius:12px;padding:22px;text-align:right;">
        <div style="margin-bottom:13px;">
          <label style="font-size:12px;color:#6b4c30;font-weight:600;display:block;margin-bottom:5px;">קוד כיתה:</label>
          <input id="lC" placeholder="למשל: ז1 — ריק = כניסת מנהל"
            style="width:100%;padding:10px 13px;font-size:14px;background:#f5ede0;border:1.5px solid #c4956a;border-radius:8px;color:#3d2b1a;"/>
        </div>
        <div style="margin-bottom:16px;">
          <label style="font-size:12px;color:#6b4c30;font-weight:600;display:block;margin-bottom:5px;">סיסמה:</label>
          <input id="lP" type="password" placeholder="סיסמת מורה"
            style="width:100%;padding:10px 13px;font-size:14px;background:#f5ede0;border:1.5px solid #c4956a;border-radius:8px;color:#3d2b1a;"/>
        </div>
        ${err?`<div style="background:rgba(176,64,64,.1);border:1px solid rgba(176,64,64,.3);border-radius:7px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#8b3030;">${err}</div>`:""}
        <button class="btn" data-action="login"
          style="width:100%;background:#8b5e3c;color:#f9f3e8;padding:11px;border-radius:9px;font-weight:700;font-size:15px;border:none;">
          🔑 כניסה
        </button>
      </div>
      <div style="margin-top:11px;font-size:10px;color:#a08060;">כניסת מנהל: קוד כיתה ריק + סיסמת מנהל</div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById("lC")?.focus(),100);
}

async function doLogin(){
  const cls=(document.getElementById("lC")?.value||"").trim().toUpperCase();
  const pass=(document.getElementById("lP")?.value||"").trim();
  if(pass===MASTER){
    S.isAdmin=true;S.myClass="";S.selCls="all";S.screen="dashboard";S.tab="students";
    startListening();return;
  }
  if(!cls){renderLogin("נא להזין קוד כיתה");return;}
  try{
    const snap=await db.ref(`teachers/${cls}`).get();
    if(!snap.exists()){renderLogin(`כיתה "${cls}" לא נמצאה`);return;}
    if(snap.val().password!==pass){renderLogin("סיסמה שגויה");return;}
    S.isAdmin=false;S.myClass=cls;S.selCls=cls;S.screen="dashboard";S.tab="students";
    startListening();
  }catch(e){renderLogin("שגיאת חיבור — נסי שוב");}
}

    <div style="padding:10px 0;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;color:#8b5e3c;">
          לוח מורה — ${S.isAdmin?"כל הכיתות":`כיתה ${S.myClass}`}
        </div>
        <div style="font-size:9px;color:#a08060;margin-top:1px;">מתעדכן בזמן אמת ✦ ${S.ts}</div>
      </div>
      <button class="btn" data-action="logout"
        style="background:transparent;border:1px solid #c4956a;color:#6b4c30;padding:5px 12px;border-radius:7px;font-size:11px;">יציאה</button>
    </div>
    <div style="display:flex;border-top:1px solid rgba(196,149,106,.3);">
      <button class="tab ${active==='students'?'active':''}" data-action="tab" data-val="students">📊 תלמידים</button>
      ${S.isAdmin?`<button class="tab ${active==='admin'?'active':''}" data-action="tab" data-val="admin">⚙️ ניהול מורים</button>`:""}
    </div>
    <div class="sroll"></div>
  </div>`;
}

// ── Admin ─────────────────────────────────────────────────────────────────
function renderAdmin(){
  S.tab="admin";
  const teachers=Object.entries(S.teachers).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById("app").innerHTML=`
  ${headerHTML("admin")}
  <div style="max-width:820px;margin:0 auto;padding:20px 16px;">
    <div style="background:#f9f3e8;border:1.5px solid #c4956a;border-radius:12px;padding:20px;margin-bottom:22px;">
      <div style="font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;color:#8b5e3c;margin-bottom:15px;">➕ הוספת מורה / כיתה</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:9px;align-items:end;">

        </div>
        <div>
          <label style="font-size:11px;color:#6b4c30;font-weight:600;display:block;margin-bottom:4px;">סיסמה:</label>
          <input id="nP" placeholder="בחרי סיסמה" maxlength="30"
            style="width:100%;padding:9px 11px;font-size:13px;background:#f5ede0;border:1.5px solid #c4956a;border-radius:7px;color:#3d2b1a;"/>
        </div>
        <button class="btn" data-action="add"

      </div>
      ${S.msg?`<div style="margin-top:10px;padding:8px 12px;background:rgba(61,122,82,.1);border:1px solid rgba(61,122,82,.3);border-radius:7px;font-size:12px;color:#2d6040;">${S.msg}</div>`:""}
      ${S.err?`<div style="margin-top:10px;padding:8px 12px;background:rgba(176,64,64,.1);border:1px solid rgba(176,64,64,.3);border-radius:7px;font-size:12px;color:#8b3030;">${S.err}</div>`:""}

    <div style="font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;color:#8b5e3c;margin-bottom:12px;">📋 מורים רשומים (${teachers.length})</div>

    ${teachers.length===0?`
    <div style="text-align:center;padding:44px;color:#a08060;">
      <div style="font-size:30px;margin-bottom:9px;">👩‍🏫</div>
      <div style="font-size:13px;">עדיין אין מורים. השתמשי בטופס למעלה.</div>
    </div>`:
    `<div style="display:flex;flex-direction:column;gap:8px;">
      ${teachers.map(([cls,t])=>{
        const cnt=Object.keys(S.classes[cls]?.students||{}).length;
        return `<div style="background:#f9f3e8;border:1.5px solid #c4956a;border-radius:10px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:11px;">
            <div style="width:35px;height:35px;border-radius:50%;background:linear-gradient(135deg,#c4956a,#8b5e3c);display:flex;align-items:center;justify-content:center;font-size:14px;color:#f9f3e8;font-weight:700;">${t.name?.charAt(0)||"?"}</div>

      }).join("")}

    <div style="margin-top:22px;padding:12px 15px;background:#f9f3e8;border:1px solid #c4956a;border-radius:9px;font-size:11px;color:#a08060;line-height:1.9;">
      <b style="color:#8b5e3c;">סיסמת מנהל:</b>
      <code style="background:#ede0cc;padding:1px 6px;border-radius:3px;">${MASTER}</code>
      — שמרי אותה. לשינוי יש לערוך את teacher.html.

}

async function addTeacher(){
  const cls=(document.getElementById("nC")?.value||"").trim().toUpperCase();
  const name=(document.getElementById("nN")?.value||"").trim();
  const pass=(document.getElementById("nP")?.value||"").trim();
  S.msg="";S.err="";
  if(!cls||!name||!pass){S.err="יש למלא את כל השדות";renderAdmin();return;}
  if(pass===MASTER){S.err="לא ניתן להשתמש בסיסמת המנהל";renderAdmin();return;}
  try{
    await db.ref(`teachers/${cls}`).set({name,password:pass});
    S.msg=`✅ "${name}" נוסף/ה לכיתה ${cls}`;renderAdmin();
  }catch(e){S.err="שגיאה — נסי שוב";renderAdmin();}
}

async function deleteTeacher(cls){
  if(!confirm(`למחוק את כיתה ${cls} וכל נתוניה?`))return;
  try{
    await db.ref(`teachers/${cls}`).remove();
    await db.ref(`classes/${cls}`).remove();
    S.msg=`כיתה ${cls} נמחקה`;renderAdmin();
  }catch(e){S.err="שגיאה";renderAdmin();}
}

async function resetClass(cls){
  if(!confirm(`לנקות את נתוני התלמידים של כיתה ${cls}?`))return;
  try{
    await db.ref(`classes/${cls}/students`).remove();
    S.msg=`כיתה ${cls} נוקתה`;renderAdmin();
  }catch(e){S.err="שגיאה";renderAdmin();}
}

// ── Students Dashboard ────────────────────────────────────────────────────
function allStu(){
  const a=[];
  for(const[cls,d]of Object.entries(S.classes))
    for(const s of Object.values(d?.students||{}))a.push({...s,classCode:cls});
  return a;
}
function clsStu(cls){return Object.values(S.classes[cls]?.students||{});}

function renderDashboard(){
  S.tab="students";
  const all=S.selCls==="all"?allStu():clsStu(S.selCls);
  const classes=Object.keys(S.classes).sort();
  const shown=all.filter(s=>{
    if(S.flt==="done")  return s.done;
    if(S.flt==="active")return!s.done;
    if(S.flt==="help")  return!s.done&&(s.pct||0)<30&&(s.qNum||0)>2;
    return true;
  });
  const help=all.filter(s=>!s.done&&(s.pct||0)<30&&(s.qNum||0)>2);
  const avg=all.length?Math.round(all.reduce((a,s)=>a+(s.pct||0),0)/all.length):0;

  const cards=shown.length===0?`
    <div style="text-align:center;padding:50px;color:#a08060;">
      <div style="font-size:32px;margin-bottom:9px;">📭</div>
      <div style="font-size:13px;">${all.length===0?"עדיין אין תלמידים בכיתה זו.":"אין תלמידים בקטגוריה זו."}</div>
      ${all.length===0?`<div style="font-size:11px;margin-top:5px;">כשתלמיד יכנס עם קוד הכיתה — הוא יופיע כאן מיד.</div>`:""}
    </div>`:
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;">
      ${shown.map(s=>{
        const d=DC[s.depth]||DC.basic;
        return`<div class="card fade" style="background:${s.done?'linear-gradient(135deg,rgba(184,134,11,.06),rgba(196,149,106,.08))':'#f9f3e8'};border:1.5px solid ${s.done?"#d4a843":"#c4956a"};border-radius:12px;padding:13px 14px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
            <div style="display:flex;align-items:center;gap:7px;">
              <div style="width:31px;height:31px;border-radius:50%;background:linear-gradient(135deg,#c4956a,#8b5e3c);display:flex;align-items:center;justify-content:center;font-size:13px;color:#f9f3e8;font-weight:700;">${s.name?.charAt(0)||"?"}</div>
              <div>
                <div style="font-weight:700;font-size:13px;color:#3d2b1a;font-family:'Frank Ruhl Libre',serif;">${s.name||"—"}</div>
                <div style="font-size:9px;color:#a08060;">${S.isAdmin?`כיתה ${s.classCode} · `:""}${s.ts||"—"}</div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
              ${s.done?`<span style="font-size:10px;color:#b8860b;font-weight:700;">📜 סיים</span>`:""}
              <span style="font-size:9px;padding:2px 6px;border-radius:9px;font-weight:700;background:${d.bg};border:1px solid ${d.bd};color:${d.c};">${d.l}</span>
            </div>
          </div>
          <div style="margin-bottom:6px;">
            <div style="display:flex;justify-content:space-between;font-size:9px;color:#a08060;margin-bottom:2px;">
              <span>${s.done?"הסתיים":"בתהליך"}</span>
              <span style="font-weight:700;color:${s.done?"#b8860b":"#8b5e3c"};">${s.pct||0}%</span>
            </div>
            <div style="background:#ede0cc;border-radius:4px;height:5px;overflow:hidden;">
              <div style="background:${s.done?'linear-gradient(90deg,#b8860b,#d4a843)':'linear-gradient(90deg,#c4956a,#d4a843)'};height:5px;width:${s.pct||0}%;transition:width .6s;border-radius:4px;"></div>
            </div>
          </div>
          <div style="display:flex;gap:8px;font-size:9px;color:#a08060;margin-bottom:6px;">
            <span>🎯 ${s.qNum||0} שאלות</span><span>📚 ${s.coveredCount||0}/${TC} נושאים</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;">
            ${Array.from({length:TC},(_,i)=>`<div style="width:10px;height:10px;border-radius:2px;background:${i<(s.coveredCount||0)?"#c4956a":"#ede0cc"};border:1px solid ${i<(s.coveredCount||0)?"#8b5e3c":"rgba(196,149,106,.3)"};"></div>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>`;

  document.getElementById("app").innerHTML=`
  ${headerHTML("students")}
  <div style="max-width:1040px;margin:0 auto;padding:16px 15px;">

    ${S.isAdmin&&classes.length>0?`
    <div style="display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap;">
      <button class="btn" data-action="selcls" data-val="all"
        style="background:${S.selCls==='all'?"#8b5e3c":"#f9f3e8"};color:${S.selCls==='all'?"#f9f3e8":"#6b4c30"};border:1px solid ${S.selCls==='all'?"#8b5e3c":"#c4956a"};padding:4px 11px;border-radius:7px;font-size:11px;font-weight:${S.selCls==='all'?700:400};">
        כל הכיתות (${allStu().length})
      </button>
      ${classes.map(cls=>`<button class="btn" data-action="selcls" data-val="${cls}"
        style="background:${S.selCls===cls?"#8b5e3c":"#f9f3e8"};color:${S.selCls===cls?"#f9f3e8":"#6b4c30"};border:1px solid ${S.selCls===cls?"#8b5e3c":"#c4956a"};padding:4px 11px;border-radius:7px;font-size:11px;font-weight:${S.selCls===cls?700:400};">
        ${cls} (${clsStu(cls).length})
      </button>`).join("")}
    </div>`:""}

    ${all.length>0?`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:15px;">
      ${[{icon:"👥",v:all.length,l:"תלמידים",c:"#8b5e3c"},{icon:"✅",v:all.filter(s=>s.done).length,l:"סיימו",c:"#3d7a52"},{icon:"📊",v:`${avg}%`,l:"ממוצע כיסוי",c:"#b8860b"},{icon:"🆘",v:help.length,l:"צריכים עזרה",c:help.length?"#b04040":"#a08060"}]
        .map(x=>`<div style="background:#f9f3e8;border:1px solid #c4956a;border-radius:9px;padding:10px;text-align:center;">
          <div style="font-size:17px;margin-bottom:2px;">${x.icon}</div>
          <div style="font-size:19px;font-weight:700;color:${x.c};font-family:'Frank Ruhl Libre',serif;">${x.v}</div>
          <div style="font-size:9px;color:#a08060;margin-top:1px;">${x.l}</div>
        </div>`).join("")}
    </div>`:""}

    ${help.length>0?`
    <div style="background:rgba(176,64,64,.07);border:1px solid rgba(176,64,64,.25);border-radius:8px;padding:9px 13px;margin-bottom:12px;">
      <b style="color:#b04040;margin-left:6px;">🆘 עשויים להזדקק לעזרה:</b>
      ${help.map(s=>`<span style="margin-left:6px;background:rgba(176,64,64,.12);padding:2px 7px;border-radius:8px;font-size:11px;color:#b04040;font-weight:600;">${s.name}${S.isAdmin?` (${s.classCode})`:""}</span>`).join("")}
    </div>`:""}

    <div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;">
      ${[["all",`הכל (${all.length})`],["active",`בתהליך (${all.filter(s=>!s.done).length})`],["done",`סיימו (${all.filter(s=>s.done).length})`],["help",`עזרה (${help.length})`]]
        .map(([k,l])=>`<button class="btn" data-action="flt" data-val="${k}"
          style="background:${S.flt===k?"#8b5e3c":"#f9f3e8"};color:${S.flt===k?"#f9f3e8":"#6b4c30"};border:1px solid ${S.flt===k?"#8b5e3c":"#c4956a"};padding:4px 10px;border-radius:7px;font-size:11px;font-weight:${S.flt===k?700:400};">${l}</button>`).join("")}
    </div>

    ${cards}
  </div>`;
}

function logout(){if(S.unsub)S.unsub();S.screen="login";S.classes={};S.teachers={};renderLogin();}

renderLogin();
}); // end _fr
</script>
</body>
</html>
